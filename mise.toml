# WARNING: THIS FILE MUST BE MANAGED WITH MISE CLI
# THIS IS THE SOURCE OF TRUTH FOR THE VERSIONS OF THE TOOLS
# THE VERSIONS OF THE TOOLS SHOULD ONLY BE SPECIFIED HERE NOT IN .ruby-version or .node-version
# USE THE BEST MISE BACKEND FOR YOUR OS
# please remove flaky backends and tools from here
# ALWAYS USE MISE TO MANAGE THIS FILE (ie mise list, mise install, mise remove)

[tools]
ruby = "3.4.4"
# Yarn is managed through npm
# lefthook is installed via Homebrew

[env]
SYSTEMD_PAGER = "cat"
GIT_PAGER = "cat"
SKIP_SYSTEM_TESTS = "true"  # Skip browser-based tests by default
# Act configuration - using Node.js 20 for GitHub Actions validation

[settings]
# Container-specific settings
experimental = true
legacy_version_file = true # Changed as per PR 3 Option A

[tasks.setup]
description = "Run development setup script"
run = "bin/setup"

[tasks.setup-next]
description = "Run setup script for 'next' environment"
run = "bin/setup-next"

[tasks.brakeman]
description = "Run Brakeman security scanner"
run = "bundle exec brakeman --no-pager --quiet"

[tasks.lint-ruby]
description = "Lint Ruby code with RuboCop"
run = "bundle exec rubocop"

[tasks.lint]
description = "Run Ruby linters"
run = "mise run lint-ruby"
alias = ["l"]

[tasks.test-prepare]
description = "Prepare test database for main tests"
run = "bin/rails test:prepare --trace"
