[tools]
node = '22'

# get the ruby version from the .ruby-version file
ruby = "3.4"

yarn = '1.22'
lefthook = 'latest'

[env]
SYSTEMD_PAGER = "cat"
GIT_PAGER = "cat"

[settings]
# Container-specific settings
experimental = true
legacy_version_file = true # Changed as per PR 3 Option A

[tasks.setup]
description = "Run development setup script"
run = "bin/setup"

# Tasks for the 'test' job in main.yml
[tasks.test-prepare]
description = "Prepare test database for main tests"
run = "bin/rails test:prepare --trace"

[tasks.test] # Renamed from 'test' in previous version to avoid conflict if 'test' is a general group
description = "Run unit and integration tests for main application"
run = "bin/rails test"
depends = ["test-prepare"]

[tasks.test-system]
description = "Run system tests for main application"
run = "bin/rails test:system HEADLESS=true CUPRITE=true CUPRITE_JS_ERRORS=true APP_HOST='127.0.0.1'"
depends = ["test-prepare"]

# Tasks for the 'test-next' job in main.yml
[tasks.setup-next]
description = "Run setup script for 'next' environment"
run = "bin/setup-next"

[tasks.test-next-prepare]
description = "Prepare test database for 'next' environment"
run = "next rails test:prepare --trace"

[tasks.test-next-run] # Explicit name to differentiate from main 'test' task
description = "Run unit and integration tests for 'next' environment"
run = "next rails test"
depends = ["test-next-prepare"]

[tasks.test-next-system]
description = "Run system tests for 'next' environment"
run = "next bin/rails test:system HEADLESS=true CUPRITE=true CUPRITE_JS_ERRORS=true APP_HOST='127.0.0.1'"
depends = ["test-next-prepare"]


# Deployment tasks
[tasks.deploy-heroku]
description = "Deploy application to Heroku"
run = "bundle exec dpl --provider=heroku --api-key=${HEROKU_API_KEY} --app=${HEROKU_APP_NAME}"
env = { HEROKU_API_KEY = "", HEROKU_APP_NAME = "" } # Declares that these vars are used, actual values from shell


[tasks.brakeman]
description = "Run Brakeman security scanner"
run = "bundle exec brakeman --no-pager --quiet"

[tasks.lint-ruby]
description = "Lint Ruby code with RuboCop"
run = "bundle exec rubocop"

[tasks.lint-js]
description = "Lint JavaScript/TypeScript code with Prettier"
run = "yarn run lint:check"

[tasks.lint]
description = "Run all linters (Ruby, JS)"
run = "sh -c 'bundle exec rubocop && yarn run lint:check'"
alias = ["l"]


[tasks.fix-ruby]
description = "Auto-fix Ruby code with RuboCop"
run = "bundle exec rubocop -A"

[tasks.fix-js]
description = "Auto-fix JavaScript/TypeScript code with Prettier"
run = "yarn run lint"

[tasks.fix]
description = "Run all auto-fixers (Ruby, JS)"
run = "sh -c 'bundle exec rubocop -A && yarn run lint'"
alias = ["f"]
