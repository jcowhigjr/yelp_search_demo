# WARNING: THIS FILE MUST BE MANAGED WITH MISE CLI
# THIS IS THE SOURCE OF TRUTH FOR THE VERSIONS OF THE TOOLS
# THE VERSIONS OF THE TOOLS SHOULD ONLY BE SPECIFIED HERE NOT IN .ruby-version or .node-version
# USE THE BEST MISE BACKEND FOR YOUR OS
# please remove flaky backends and tools from here
# ALWAYS USE MISE TO MANAGE THIS FILE (ie mise list, mise install, mise remove)

# Ruby is a core builtin plugin in mise - no external plugin needed
# Fixed GitHub Actions failure by removing invalid [plugins] section

[tools]
ruby = "3.3.11"
bun = "1.1.38"  # For local development only (not used in CI/CD)
# lefthook is installed via Homebrew
# Node.js and yarn are NOT included here to prevent CI compilation issues
# Bun replaces Yarn for faster local package management

[env]
SYSTEMD_PAGER = "cat"
GIT_PAGER = "cat"
SKIP_SYSTEM_TESTS = "true" # Skip browser-based tests by default
# Act configuration - using Node.js 20 for GitHub Actions validation
# Force use of precompiled binaries for faster installation
RUBY_BUILD_CACHE_PATH = "$HOME/.cache/ruby-build"
RUBY_CONFIGURE_OPTS = "--disable-install-doc"
# Use precompiled Ruby binaries when available
MISE_RUBY_BUILD_OPTS = "--disable-install-doc"

[vars]
# Shared test environment variables to avoid DRb/TMPDIR permission errors
CI = "true"
RAILS_ENV = "test"
HEADLESS = "true"
CUPRITE = "true"
APP_HOST = "localhost"
TMPDIR = "$PWD/tmp"
PARALLEL_WORKERS = "3"

[settings]
# Container-specific settings
experimental = true
lockfile = true
legacy_version_file = false # Changed as per PR 3 Option A
# Enable faster installation via precompiled binaries
always_keep_download = true
trusted_config_paths = ["."]

[tasks.setup]
description = "Run development setup script"
run = "bin/setup"

[tasks.setup-next]
description = "Run setup script for 'next' environment"
run = "bin/setup-next"

[tasks.setup-test]
description = "CI-optimized setup (skips redundant environment checks)"
run = "bin/setup --skip-server"
env = { SETUP_SKIP_ENV = "true", SKIP_CLEAN = "true" }

[tasks.brakeman]
description = "Run Brakeman security scanner"
run = "bundle exec brakeman --no-pager --quiet"

[tasks.lint-ruby]
description = "Lint Ruby code with RuboCop"
run = "bundle exec rubocop"

[tasks.lint]
description = "Run Ruby linters"
run = "mise run lint-ruby"
alias = ["l"]

[tasks.test-prepare]
description = "Prepare test database for main tests"
run = "mkdir -p tmp && CI=true RAILS_ENV=test TMPDIR=$PWD/tmp bin/rails test:prepare --trace"

[tasks.test]
description = "Run unit and integration tests for main application"
run = "CI=true RAILS_ENV=test TMPDIR=$PWD/tmp bin/rails test"
depends = ["test-prepare"]

[tasks.test-system]
description = "Run only system tests against an already-prepared test env (matches lefthook env)"
run = "mkdir -p tmp && CI=true RAILS_ENV=test HEADLESS=true CUPRITE=true APP_HOST=localhost TMPDIR=$PWD/tmp CUPRITE_JS_ERRORS=false bin/rails test:system"

[tasks.test-system-strict]
description = "Run system tests with JS errors treated as failures"
run = "mkdir -p tmp && CI=true RAILS_ENV=test HEADLESS=true CUPRITE=true APP_HOST=localhost TMPDIR=$PWD/tmp CUPRITE_JS_ERRORS=true bin/rails test:system"

[tasks.test-next-prepare]
description = "Prepare test database for 'next' environment"
run = "mkdir -p tmp && CI=true RAILS_ENV=test TMPDIR=$PWD/tmp next rails test:prepare --trace"

[tasks.test-next-run]
description = "Run unit and integration tests for 'next' environment"
run = "CI=true RAILS_ENV=test TMPDIR=$PWD/tmp next rails test"
depends = ["test-next-prepare"]

[tasks.test-next-system]
description = "Run system tests for 'next' environment"
run = "mkdir -p tmp && HEADLESS=true CUPRITE=true CUPRITE_JS_ERRORS=true APP_HOST=localhost TMPDIR=$PWD/tmp next rails test:system"
depends = ["test-next-prepare"]

[tasks.test-next-system-ci]
description = "Run system tests for 'next' environment (CI optimized: skips prepare dependency)"
run = "mkdir -p tmp && HEADLESS=true CUPRITE=true CUPRITE_JS_ERRORS=true APP_HOST=localhost TMPDIR=$PWD/tmp next rails test:system"

[tasks.test-scripts]
description = "Shell-level CLI tests for helper scripts (stacked-pr.sh, etc.)"
run = "bash test/scripts/stacked_pr_cli_test.sh"

[tasks.test-smoke]
description = "Fast Rails smoke tests without system/browser suites"
run = "mkdir -p tmp && CI=true RAILS_ENV=test TMPDIR=$PWD/tmp bin/rails test:prepare --trace && bin/rails test test/controllers test/models"

[tasks.test-next-smoke]
description = "Fast Next Rails smoke tests"
run = "mkdir -p tmp && CI=true RAILS_ENV=test TMPDIR=$PWD/tmp next rails test:prepare --trace && next rails test test/controllers test/models"

[tasks.ruby-evergreen-patch]
description = "Update Ruby version declarations to the latest patch in the current minor"
run = "ruby scripts/update_ruby_version.rb --latest-patch --apply"
