# Codex automation environment prep steps aligned with .github/workflows/main.yml
setup_sequence:
  - name: clear_mise_cache_and_config
    run: |
      rm -rf ~/.local/share/mise
      rm -rf ~/.config/mise
      echo "Cleared mise cache and configuration"
  - name: setup_environment
    env:
      SETUP_SKIP_NODE: "true"
    run: |
      bash bin/setup-environment.sh
  - name: export_mise_bin_path
    run: |
      export PATH="$HOME/.local/bin:$PATH"
      echo "Added $HOME/.local/bin to PATH for subsequent commands"
