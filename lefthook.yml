pre-commit:
  commands:
    protect_main_branches:
      run: "#!/bin/bash\nbranch=$(git branch --show-current)\nif [ \"$branch\" = \"\
        main\" ] || [ \"$branch\" = \"develop\" ]; then\n  echo \"\u274C Direct commits\
        \ to $branch are not allowed!\"\n  echo \"   Use: lefthook run workflow-new-feature\
        \ <branch-name>\"\n  echo \"   Example: lefthook run workflow-new-feature\
        \ fix/issue-123\"\n  exit 1\nfi\n"
    validate-mise-toml:
      glob: mise.toml
      run: bash scripts/validate-mise-toml.sh
      tags: validation
      skip:
      - merge
      - rebase
    check_branch_sync:
      run: "#!/bin/bash\nif git rev-parse --verify HEAD@{upstream} >/dev/null 2>&1;\
        \ then\n  local_sha=$(git rev-parse HEAD)\n  remote_sha=$(git rev-parse HEAD@{upstream})\n\
        \  if [ \"$local_sha\" != \"$remote_sha\" ]; then\n    behind_count=$(git\
        \ rev-list --count HEAD..HEAD@{upstream})\n    if [ $behind_count -gt 0 ];\
        \ then\n      echo \"\u26A0\uFE0F  Warning: Your branch is $behind_count commits\
        \ behind remote\"\n      echo \"   Consider running 'git pull' before committing\"\
        \n    fi\n  fi\nfi\n"
      skip:
      - merge
      - rebase
    validate_dependabot_config:
      run: |
        #!/bin/sh
        REPO_ROOT="$(git rev-parse --show-toplevel)"
        MISE_EXEC="mise --cd \"$REPO_ROOT\" exec --"
        if git diff --cached --name-only | grep -q "\.github/dependabot\.yml"; then
          echo "🔍 Validating Dependabot configuration..."
          if ! eval "$MISE_EXEC ruby scripts/validate-dependabot-v2.rb"; then
            echo "❌ Dependabot configuration validation failed"
            echo "   Please fix the issues before committing"
            exit 1
          fi
        fi
      skip:
      - merge
      - rebase
pre-push:
  parallel: true
  commands:
    review-loop-enforcement:
      run: scripts/enforce-review-loop.sh
      tags: meta reviews
    dependency_check:
      tags: validation
      run: "#!/bin/bash\necho \"\U0001F50D Checking for missing gem dependencies...\"\
        \n\n# Check if any require statements don't have corresponding gems\nmissing_deps=\"\
        \"\n\n# Find all require statements in committed files\nfor file in $(git\
        \ diff --cached --name-only --diff-filter=ACM | grep -E '\\.(rb|erb)$'); do\n\
        \  if [ -f \"$file\" ]; then\n    # Look for require statements (excluding\
        \ require_relative)\n    requires=$(grep -n \"require ['\\\"]\" \"$file\"\
        \ | grep -v \"require_relative\" | sed \"s/.*require ['\\\"]//\" | sed \"\
        s/['\\\"].*//\")\n    for req in $requires; do\n      gem_name=$(echo \"$req\"\
        \ | cut -d'/' -f1)\n      # Skip standard library requires and Rails core\n\
        \      case \"$gem_name\" in\n        date|json|uri|net|open-uri|digest|base64|securerandom|logger|pathname|fileutils|tmpdir|yaml|csv|stringio|ostruct|set|forwardable|delegate|benchmark|timeout|pp|pstore|dbm|etc|fcntl|fiddle|io|nkf|openssl|psych|pty|racc|rbconfig|readline|ripper|socket|syslog|thread|time|zlib|english|irb|mkmf|optparse|prime|profiler|rake|rdoc|rss|rubygems|shellwords|singleton|test|un|weakref|webrick|win32ole|xmlrpc)\n\
        \          continue\n          ;;\n        rails*|active_*|action_*)\n   \
        \       continue\n          ;;\n      esac\n      if ! grep -q \"gem ['\\\"\
        ]$gem_name['\\\"]\" Gemfile; then\n        missing_deps=\"$missing_deps$gem_name\
        \ (required in $file)\\n\"\n      fi\n    done\n  fi\ndone\n\nif [ -n \"$missing_deps\"\
        \ ]; then\n  echo \"\u274C Missing gem dependencies detected:\"\n  echo \"\
        $missing_deps\"\n  echo \"   Please add these gems to your Gemfile\"\n  exit\
        \ 1\nfi\n\necho \"\u2705 All dependencies appear to be present\"\n"
    rails-tests:
      tags: backend tests
      run: "REPO_ROOT=\"$(git rev-parse --show-toplevel)\"\nMISE_EXEC=(mise --cd \"\
        $REPO_ROOT\" exec --)\nif [ -f .env ]; then\n  . ./.env\nfi\necho \"\U0001F680\
        \ Setting up test environment...\"\n\n# Setup phase - detailed logs captured\
        \ by bin/setup into log/setup*.log\nif ! CI=true RAILS_ENV=test SETUP_SKIP_NODE=true SKIP_CLEAN=true\
        \ \"${MISE_EXEC[@]}\" bin/setup --skip-server; then\n  echo \"\u274C Failed\
        \ to set up test environment (see log/setup.log for details)\"\n  exit 1\n\
        fi\n\necho \"\U0001F527 Preparing test database...\"\nif ! CI=true RAILS_ENV=test\
        \ \"${MISE_EXEC[@]}\" bin/rails db:test:prepare --trace; then\n  echo \"\u274C\
        \ Failed to prepare test database\"\n  exit 1\nfi\n\necho \"\U0001F9EA Running\
        \ Rails tests...\"\nif ! CI=true RAILS_ENV=test \"${MISE_EXEC[@]}\" bin/rails\
        \ test --quiet; then\n  echo \"\u274C Rails tests failed\"\n  exit 1\nfi\n\
        \necho \"\u2705 Rails tests completed successfully.\"\n\necho \"\U0001F50D\
        \ Verifying tailwind.css existence locally after test:prepare...\"\nif [ -f\
        \ app/assets/builds/tailwind.css ]; then\n  echo \"\u2705 app/assets/builds/tailwind.css\
        \ found locally.\"\nelse\n  echo \"\u274C app/assets/builds/tailwind.css NOT\
        \ found locally after test:prepare.\"\n  echo \"   Contents of app/assets/builds/:\"\
        \n  ls -la app/assets/builds/ || echo \"app/assets/builds/ directory does\
        \ not exist\"\nfi\n"
    rails-system-tests:
      tags: backend system-tests
      run: "REPO_ROOT=\"$(git rev-parse --show-toplevel)\"\nMISE_EXEC=(mise --cd \"\
        $REPO_ROOT\" exec --)\nif [ -f .env ]; then\n  . ./.env\nfi\nif ./scripts/should-run-system-tests.sh;\
        \ then\n  echo \"\u23ED\uFE0F  Skipping system tests (safe changes only)\"\
        \n  exit 0\nfi\necho \"\U0001F680 Setting up system test environment...\"\n\
        if ! CI=true RAILS_ENV=test SETUP_SKIP_NODE=true SKIP_CLEAN=true TEST_DATABASE_NAME='db/test-system.sqlite3' \"${MISE_EXEC[@]}\" bin/setup\
        \ --skip-server; then\n  echo \"\u274C Failed to set up system test environment\
        \ (see log/setup.log for details)\"\n  exit 1\nfi\n\necho \"\U0001F527 Preparing\
        \ system test database...\"\nif ! CI=true RAILS_ENV=test TEST_DATABASE_NAME='db/test-system.sqlite3' \"${MISE_EXEC[@]}\"\
        \ bin/rails test:prepare --trace; then\n  echo \"\u274C Failed to prepare\
        \ system test database\"\n  exit 1\nfi\n\necho \"\U0001F9EA Running system\
        \ tests...\"\nif ! CI=true RAILS_ENV=test HEADLESS=true CUPRITE=true APP_HOST='localhost'\
        \ TEST_DATABASE_NAME='db/test-system.sqlite3' CUPRITE_JS_ERRORS=false \"${MISE_EXEC[@]}\" bin/rails test:system --quiet;\
        \ then\n  echo \"\u274C System tests failed\"\n  exit 1\nfi\n\necho \"\u2705\
        \ All system tests passed\"\n"
    tailwind-build-check:
      tags: frontend build
      run: 'REPO_ROOT="$(git rev-parse --show-toplevel)"

        MISE_EXEC=(mise --cd "$REPO_ROOT" exec --)

        "${MISE_EXEC[@]}" scripts/verify-tailwind-build.sh

        '
    cross-model-reminder:
      tags: meta
      run: "#!/bin/bash\nset -euo pipefail\n\n# If nothing is staged, do nothing\n\
        if git diff --cached --quiet; then\n  exit 0\nfi\n\nstaged_files=$(git diff\
        \ --cached --name-only)\nif [ -z \"$staged_files\" ]; then\n  exit 0\nfi\n\
        \nsurfaces=()\nwhile IFS= read -r file; do\n  case \"$file\" in\n    app/assets/*|app/views/*)\n\
        \      [[ \" ${surfaces[*]} \" =~ \" ui \" ]] || surfaces+=(\"ui\")\n    \
        \  ;;\n    app/controllers/*|app/helpers/*|app/serializers/*)\n      [[ \"\
        \ ${surfaces[*]} \" =~ \" api \" ]] || surfaces+=(\"api\")\n      ;;\n   \
        \ app/jobs/*|app/workers/*|app/services/*|app/mailers/*)\n      [[ \" ${surfaces[*]}\
        \ \" =~ \" job \" ]] || surfaces+=(\"job\")\n      ;;\n  esac\ndone <<<\"\
        $staged_files\"\n\nif [ ${#surfaces[@]} -eq 0 ]; then\n  exit 0\nfi\n\nbranch=$(git\
        \ rev-parse --abbrev-ref HEAD 2>/dev/null || echo \"unknown\")\necho \"\U0001F501\
        \ Cross-model review reminder (branch: $branch)\"\necho \"    Staged files\
        \ touch: ${surfaces[*]} surfaces\"\necho \"    If today's fix was hard to\
        \ verify, run:\"\necho \"      scripts/generate-cross-model-prompt.sh <issue-url-or-number>\
        \ ${surfaces[0]}\"\necho \"      claude --model opus --message \\\"\\$(scripts/generate-cross-model-prompt.sh\
        \ <issue-url-or-number> ${surfaces[0]})\\\"\"\nif [[ \" ${surfaces[*]} \"\
        \ =~ \" ui \" ]]; then\n  echo \"    For CSS/Tailwind/ERB-heavy visual fixes,\
        \ you can also run:\"\n  echo \"      scripts/ai-css-review.sh <issue-url-or-number>\"\
        \n  echo \"      claude --model opus --message \\\"\\$(scripts/ai-css-review.sh\
        \ <issue-url-or-number>)\\\"\"\nfi\necho \"    Details: docs/AGENTS.md#empirical-verification--cross-model-escalation-issue-981\"\
        \n"
    gems-audit:
      tags: backend security
      run: "REPO_ROOT=\"$(git rev-parse --show-toplevel)\"\nMISE_EXEC=(mise --cd \"\
        $REPO_ROOT\" exec --)\necho \"\U0001F50D Running gem audit (with timeout)...\"\
        \nif command -v timeout >/dev/null 2>&1; then\n  if ! timeout 30 \"${MISE_EXEC[@]}\"\
        \ bundle audit check > log/prepush-gem-audit.log 2>&1; then\n    echo \"\u26A0\
        \uFE0F Gem audit reported issues or timed out. See log/prepush-gem-audit.log\
        \ for details.\"\n  else\n    echo \"\u2705 Gem audit completed without blocking\
        \ issues.\"\n  fi\nelse\n  if ! \"${MISE_EXEC[@]}\" bundle audit check > log/prepush-gem-audit.log\
        \ 2>&1; then\n    echo \"\u26A0\uFE0F Gem audit reported issues. See log/prepush-gem-audit.log\
        \ for details.\"\n  else\n    echo \"\u2705 Gem audit completed without blocking\
        \ issues.\"\n  fi\nfi\n"
    importmaps-audit:
      tags: frontend security
      run: "REPO_ROOT=\"$(git rev-parse --show-toplevel)\"\nMISE_EXEC=(mise --cd \"\
        $REPO_ROOT\" exec --)\nif ! \"${MISE_EXEC[@]}\" bin/importmap audit > log/prepush-importmap-audit.log\
        \ 2>&1; then\n  echo \"\u26A0\uFE0F Importmap audit reported issues. See log/prepush-importmap-audit.log\
        \ for details.\"\nelse\n  echo \"\u2705 Importmap audit completed without\
        \ blocking issues.\"\nfi\n"
    verify_ci_ready:
      tags: backend ci
      run: "REPO_ROOT=\"$(git rev-parse --show-toplevel)\"\nMISE_CMD=(mise --cd \"\
        $REPO_ROOT\")\necho \"Checking for mise updates and attempting to upgrade\
        \ if necessary...\"\nif command -v brew >/dev/null 2>&1; then\n  if brew outdated\
        \ | grep -q \"mise\"; then\n    echo \"Mise is outdated, attempting to upgrade\
        \ via Homebrew...\"\n    if ! (brew update && brew upgrade mise); then\n \
        \     echo \"\u274C Failed to upgrade mise. Please upgrade it manually.\"\n\
        \      exit 1\n    fi\n    echo \"\u2705 Mise upgraded successfully.\"\n \
        \ else\n    echo \"\u2139\uFE0F Mise is up to date.\"\n  fi\nelse\n  echo\
        \ \"\u26A0\uFE0F Skipping mise upgrade: Homebrew (brew) not available\"\n\
        fi\necho \"Verifying CI readiness with mise doctor (logging to .mise_doctor.log)...\"\
        \nif ! \"${MISE_CMD[@]}\" doctor > \"$REPO_ROOT/.mise_doctor.log\" 2>&1; then\n\
        \  if grep -q \"mise is not activated\" \"$REPO_ROOT/.mise_doctor.log\"; then\n\
        \    echo \"\u26A0\uFE0F mise doctor reported 'mise is not activated'.\"\n\
        \    echo \"   Continuing because hooks rely on 'mise exec --' for tool execution.\"\
        \n  elif grep -q \"plugin core is not installed\" \"$REPO_ROOT/.mise_doctor.log\"\
        ; then\n    echo \"\u26A0\uFE0F mise doctor reported 'plugin core is not installed'.\"\
        \n    echo \"   Continuing because Ruby is a core plugin and hooks use mise\
        \ exec --.\"\n  elif grep -q \"plugin ruby overrides a core plugin\" \"$REPO_ROOT/.mise_doctor.log\"\
        ; then\n    echo \"\u26A0\uFE0F mise doctor reported 'plugin ruby overrides\
        \ a core plugin'.\"\n    echo \"   Continuing because Ruby is a core plugin.\"\
        \n  else\n    echo \"\u274C mise doctor failed. See .mise_doctor.log for details.\"\
        \n    exit 1\n  fi\nfi\necho \"\u2705 CI environment ready.\"\n"
    rubocop:
      tags: backend style
      glob: '*.rb'
      run: "REPO_ROOT=\"$(git rev-parse --show-toplevel)\"\nMISE_EXEC=(mise --cd \"\
        $REPO_ROOT\" exec --)\nif git rev-parse --verify HEAD@{upstream} >/dev/null\
        \ 2>&1; then\n  diff_base=\"HEAD@{upstream}\"\nelif git rev-parse --verify\
        \ origin/develop >/dev/null 2>&1; then\n  diff_base=\"$(git merge-base HEAD\
        \ origin/develop)\"\nelse\n  diff_base=\"HEAD^\"\nfi\n\nfiles=( $(git diff\
        \ --name-only \"${diff_base}..HEAD\" -- '*.rb') )\nif [ ${#files[@]} -eq 0\
        \ ]; then\n  echo \"\u2705 No Ruby files changed; skipping rubocop\"\n  exit\
        \ 0\nfi\n\n\"${MISE_EXEC[@]}\" bundle exec rubocop --parallel --force-exclusion\
        \ \"${files[@]}\"\n"
      stage_fixed: true
    erb_lint:
      tags: backend style
      glob: '*.erb'
      run: "REPO_ROOT=\"$(git rev-parse --show-toplevel)\"\nMISE_EXEC=(mise --cd \"\
        $REPO_ROOT\" exec --)\nif git rev-parse --verify HEAD@{upstream} >/dev/null\
        \ 2>&1; then\n  diff_base=\"HEAD@{upstream}\"\nelif git rev-parse --verify\
        \ origin/develop >/dev/null 2>&1; then\n  diff_base=\"$(git merge-base HEAD\
        \ origin/develop)\"\nelse\n  diff_base=\"HEAD^\"\nfi\n\nfiles=( $(git diff\
        \ --name-only \"${diff_base}..HEAD\" -- '*.erb') )\nif [ ${#files[@]} -eq\
        \ 0 ]; then\n  echo \"\u2705 No ERB files changed; skipping erb_lint\"\n \
        \ exit 0\nfi\n\n\"${MISE_EXEC[@]}\" bundle exec erblint --lint-all --format\
        \ compact \"${files[@]}\"\n"
      stage_fixed: true
    ruby-format:
      tags: frontend style
      glob: '*.{css,scss,md,json}'
      run: "REPO_ROOT=\"$(git rev-parse --show-toplevel)\"\nMISE_EXEC=(mise --cd \"\
        $REPO_ROOT\" exec --)\nif git rev-parse --verify HEAD@{upstream} >/dev/null\
        \ 2>&1; then\n  diff_base=\"HEAD@{upstream}\"\nelif git rev-parse --verify\
        \ origin/develop >/dev/null 2>&1; then\n  diff_base=\"$(git merge-base HEAD\
        \ origin/develop)\"\nelse\n  diff_base=\"HEAD^\"\nfi\n\necho \"\U0001F50D Checking for formatting issues...\"\n\
        \ # For now, just check if files exist and skip formatting\n# TODO: Add Ruby-based CSS/JSON formatters if needed\n\
        \ echo \"\u2705 No Ruby-based formatting needed for these file types\"\n"
      stage_fixed: true
    yaml-lint:
      tags: backend style
      exclude: rebase-merge-only develop
      glob: '*.yml'
      run: "REPO_ROOT=\"$(git rev-parse --show-toplevel)\"\nMISE_EXEC=(mise --cd \"\
        $REPO_ROOT\" exec --)\nif git rev-parse --verify HEAD@{upstream} >/dev/null\
        \ 2>&1; then\n  diff_base=\"HEAD@{upstream}\"\nelif git rev-parse --verify\
        \ origin/develop >/dev/null 2>&1; then\n  diff_base=\"$(git merge-base HEAD\
        \ origin/develop)\"\nelse\n  diff_base=\"HEAD^\"\nfi\n\nfiles=( $(git diff\
        \ --name-only \"${diff_base}..HEAD\" -- '*.yml') )\nif [ ${#files[@]} -eq\
        \ 0 ]; then\n  echo \"\u2705 No YAML files changed; skipping yaml-lint\"\n\
        \  exit 0\nfi\n\n\"${MISE_EXEC[@]}\" bundle exec yaml-lint \"${files[@]}\"\
        \n"
      stage_fixed: true
    verify_environment:
      run: "REPO_ROOT=\"$(git rev-parse --show-toplevel)\"\nMISE_EXEC=(mise --cd \"\
        $REPO_ROOT\" exec --)\nset +e\noutput=$(\"${MISE_EXEC[@]}\" bin/container-healthcheck.sh\
        \ 2>&1)\nstatus=$?\nset -e\nif [ $status -eq 0 ]; then\n  echo \"\u2713 Environment\
        \ valid\"\n  exit 0\nfi\nif echo \"$output\" | grep -q \"mise is not activated\"\
        ; then\n  echo \"\u26A0\uFE0F container-healthcheck reported 'mise is not\
        \ activated'.\"\n  echo \"   Continuing because hooks rely on 'mise exec --'\
        \ for tool execution.\"\n  exit 0\nfi\nif echo \"$output\" | grep -q \"plugin\
        \ core is not installed\"; then\n  echo \"\u26A0\uFE0F container-healthcheck\
        \ reported 'plugin core is not installed'.\"\n  echo \"   Continuing because\
        \ Ruby is a core plugin and hooks use mise exec --.\"\n  exit 0\nfi\nif echo\
        \ \"$output\" | grep -q \"plugin ruby overrides a core plugin\"; then\n  echo\
        \ \"\u26A0\uFE0F container-healthcheck reported 'plugin ruby overrides a core\
        \ plugin'.\"\n  echo \"   Continuing because Ruby is a core plugin.\"\n  exit\
        \ 0\nfi\necho \"$output\"\necho \"\u2717 Environment invalid - run bin/setup-environment.sh\"\
        \nexit 1\n"
      tags: validation
      skip:
      - merge
      - rebase
