# Workflow commands for agent coders and developers
workflow-status:
  piped: true
  commands:
    check_status:
      run: |
        #!/bin/bash
        echo "🔍 Git Workflow Status Check"
        echo "=========================="
        
        # Check current branch
        current_branch=$(git branch --show-current)
        echo "📍 Current branch: $current_branch"
        
        # Check if on protected branch
        if [ "$current_branch" = "main" ] || [ "$current_branch" = "develop" ]; then
          echo "⚠️  WARNING: You are on a protected branch ($current_branch)"
          echo "   Use 'lefthook run workflow-new-feature <branch-name>' to create a feature branch"
        fi
        
        # Check git status
        echo ""
        echo "📝 Git Status:"
        git status --porcelain
        
        # Check if behind remote
        echo ""
        echo "🔄 Remote sync status:"
        if git rev-parse --verify HEAD@{upstream} >/dev/null 2>&1; then
          local_sha=$(git rev-parse HEAD)
          remote_sha=$(git rev-parse HEAD@{upstream})
          if [ "$local_sha" != "$remote_sha" ]; then
            behind_count=$(git rev-list --count HEAD..HEAD@{upstream})
            ahead_count=$(git rev-list --count HEAD@{upstream}..HEAD)
            if [ $behind_count -gt 0 ]; then
              echo "⚠️  Your branch is $behind_count commits behind remote"
              echo "   Run 'git pull' to sync with remote"
            fi
            if [ $ahead_count -gt 0 ]; then
              echo "📤 Your branch is $ahead_count commits ahead of remote"
            fi
          else
            echo "✅ Branch is up to date with remote"
          fi
        else
          echo "ℹ️  No upstream tracking branch set"
        fi

workflow-new-feature:
  commands:
    create_branch:
      run: bash ./workflow-new-feature.sh {0}
