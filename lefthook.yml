# EXAMPLE USAGE
# Refer for explanation to following link:
# https://evilmartians.github.io/lefthook/configuration/no_tty.html
# SOME COMMANDS RELY ON THE MISE SHIMS BEING ON PATH

shell: bash
verbose: false
skip_output:
  - meta
  - success

# Pre-commit hooks for branch protection and quality
pre-commit:
  commands:
    protect_main_branches:
      run: |
        #!/bin/bash
        branch=$(git branch --show-current)
        if [ "$branch" = "main" ] || [ "$branch" = "develop" ]; then
          echo "❌ Direct commits to $branch are not allowed!"
          echo "   Use: lefthook run workflow-new-feature <branch-name>"
          echo "   Example: lefthook run workflow-new-feature fix/issue-123"
          exit 1
        fi
      skip:
        - merge
        - rebase
    check_branch_sync:
      run: |
        #!/bin/bash
        if git rev-parse --verify HEAD@{upstream} >/dev/null 2>&1; then
          local_sha=$(git rev-parse HEAD)
          remote_sha=$(git rev-parse HEAD@{upstream})
          if [ "$local_sha" != "$remote_sha" ]; then
            behind_count=$(git rev-list --count HEAD..HEAD@{upstream})
            if [ $behind_count -gt 0 ]; then
              echo "⚠️  Warning: Your branch is $behind_count commits behind remote"
              echo "   Consider running 'git pull' before committing"
            fi
          fi
        fi
      skip:
        - merge
        - rebase
    check_merge_conflicts:
      run: |
        #!/bin/bash
        echo "🔍 Checking for unresolved merge conflict markers..."
        if git diff --cached | grep -E '^[+](<<<<<<<|=======|>>>>>>>)'; then
          echo "❌ ERROR: Merge conflict markers detected in staged files!"
          echo ""
          echo "Files with conflict markers:"
          git diff --cached --name-only | while read file; do
            if git diff --cached "$file" | grep -qE '^[+](<<<<<<<|=======|>>>>>>>)'; then
              echo "  - $file"
            fi
          done
          echo ""
          echo "Please resolve all merge conflicts before committing."
          echo "Look for lines containing: <<<<<<<, =======, or >>>>>>>"
          exit 1
        fi
        echo "✅ No merge conflict markers found"
    check_commit_size:
      run: |
        #!/bin/bash
        # Skip on merge commits
        if git rev-parse -q --verify MERGE_HEAD >/dev/null; then
          exit 0
        fi
        
        echo "🔍 Checking commit size..."
        
        # Count staged files
        staged_count=$(git diff --cached --name-only | wc -l | tr -d ' ')
        
        # Count total lines changed (additions + deletions)
        lines_changed=$(git diff --cached --numstat | awk '{sum+=$1+$2} END {print sum}')
        
        # Thresholds
        MAX_FILES=30
        MAX_LINES=1000
        WARN_FILES=15
        WARN_LINES=500
        
        has_error=0
        has_warning=0
        
        # Check for errors (hard limits)
        if [ "$staged_count" -gt "$MAX_FILES" ]; then
          echo "❌ ERROR: Too many files in one commit: $staged_count files (max: $MAX_FILES)"
          echo "   This likely indicates:"
          echo "   - Accidental inclusion of generated files"
          echo "   - Multiple unrelated changes bundled together"
          echo "   - Missing .gitignore entries"
          has_error=1
        fi
        
        if [ "$lines_changed" -gt "$MAX_LINES" ]; then
          echo "❌ ERROR: Too many lines changed: $lines_changed lines (max: $MAX_LINES)"
          echo "   Consider breaking this into smaller, focused commits"
          echo "   Each commit should represent one logical change"
          has_error=1
        fi
        
        # Check for warnings (soft limits)
        if [ "$staged_count" -gt "$WARN_FILES" ] && [ "$has_error" -eq 0 ]; then
          echo "⚠️  WARNING: Large commit detected: $staged_count files"
          echo "   Consider if this should be split into multiple commits"
          has_warning=1
        fi
        
        if [ "$lines_changed" -gt "$WARN_LINES" ] && [ "$has_error" -eq 0 ]; then
          echo "⚠️  WARNING: Large change detected: $lines_changed lines"
          echo "   Ensure this represents a single logical change"
          has_warning=1
        fi
        
        # Check for common screwup patterns
        if git diff --cached --name-only | grep -q "package-lock.json\|yarn.lock\|Gemfile.lock"; then
          lock_files=$(git diff --cached --name-only | grep "package-lock.json\|yarn.lock\|Gemfile.lock" | wc -l | tr -d ' ')
          other_files=$((staged_count - lock_files))
          
          if [ "$other_files" -gt 20 ]; then
            echo "⚠️  WARNING: Lock file changes combined with many other files ($other_files files)"
            echo "   This might indicate dependency updates mixed with feature work"
          fi
        fi
        
        # Check for debug code patterns
        if git diff --cached | grep -qE '^\+.*(console\.log|debugger|binding\.pry|byebug|puts "DEBUG)'; then
          echo "⚠️  WARNING: Possible debug code detected"
          echo "   Found: console.log, debugger, binding.pry, byebug, or DEBUG output"
          echo "   Review staged changes to ensure no debug code is committed"
          has_warning=1
        fi
        
        if [ "$has_error" -eq 1 ]; then
          echo ""
          echo "💡 Tips:"
          echo "   - Use 'git reset HEAD <file>' to unstage files"
          echo "   - Use 'git add -p' for selective staging"
          echo "   - Break large changes into focused commits"
          exit 1
        fi
        
        if [ "$has_warning" -eq 0 ]; then
          echo "✅ Commit size looks reasonable ($staged_count files, $lines_changed lines)"
        fi
      skip:
        - merge
        - rebase
    validate_dependabot_config:
      run: |
        #!/bin/bash
        if git diff --cached --name-only | grep -q "\.github/dependabot\.yml"; then
          echo "🔍 Validating Dependabot configuration..."
          if ! ruby scripts/validate-dependabot-v2.rb; then
            echo "❌ Dependabot configuration validation failed"
            echo "   Please fix the issues before committing"
            exit 1
          fi
        fi
      skip:
        - merge
        - rebase
pre-push:
  pre-command: git add . && git stash
  post-command: |
    #!/bin/bash
    if [ -n "$(git ls-files --others --exclude-standard)" ]; then
      echo "❌ Error: New files were generated during the pre-push hook:"
      git ls-files --others --exclude-standard
      echo "Please commit these files before pushing."
      exit 1
    fi
  commands:
    check_ui_testing_evidence:
      tags: ui testing validation
      run: |
        #!/bin/bash
        set -euo pipefail
        
        echo "🎨 Checking for UI changes and testing evidence..."
        
        # Get the base branch (develop or main)
        base_branch="develop"
        if ! git rev-parse --verify origin/$base_branch >/dev/null 2>&1; then
          base_branch="main"
        fi
        
        # Get list of commits being pushed
        commits=$(git rev-list origin/$base_branch..HEAD 2>/dev/null || git rev-list HEAD)
        
        if [ -z "$commits" ]; then
          echo "✅ No new commits to push"
          exit 0
        fi
        
        # Keywords that indicate manual testing was done
        testing_keywords="puppeteer|screenshot|manual.test|tested.locally|browser.preview|mcp2_puppeteer|visual.verification|ui.tested"
        
        # Track if we found any UI changes without testing
        found_untested_ui=0
        untested_commits=""
        
        # Check each commit individually
        while IFS= read -r commit; do
          # Get files changed in this commit
          commit_files=$(git diff-tree --no-commit-id --name-only -r "$commit" 2>/dev/null || true)
          
          # Check if this commit touches UI files
          ui_files=$(echo "$commit_files" | grep -E 'app/(views|assets|javascript)|app/helpers.*\.rb' || true)
          
          if [ -n "$ui_files" ]; then
            # This commit has UI changes - check for testing evidence
            commit_msg=$(git log -1 --pretty=%B "$commit")
            commit_short=$(git log -1 --pretty=%h "$commit")
            commit_subject=$(git log -1 --pretty=%s "$commit")
            
            # Check if documentation-only
            if echo "$ui_files" | grep -qvE '\.md$'; then
              # Real UI changes - need testing evidence
              if ! echo "$commit_msg" | grep -qiE "$testing_keywords"; then
                found_untested_ui=1
                untested_commits="${untested_commits}  - ${commit_short}: ${commit_subject}\n"
              fi
            fi
          fi
        done <<< "$commits"
        
        if [ $found_untested_ui -eq 1 ]; then
          echo "❌ ERROR: UI changes detected without testing evidence!"
          echo ""
          echo "The following commits modify UI files but lack testing keywords:"
          echo -e "$untested_commits"
          echo ""
          echo "📋 Required: Evidence of manual testing in EACH commit message"
          echo ""
          echo "Before pushing UI changes, you MUST:"
          echo "  1. Start local server: mise exec -- bin/rails server -p 3000 &"
          echo "  2. Test with puppeteer: mcp2_puppeteer_navigate('http://localhost:3000')"
          echo "  3. Take screenshots: mcp2_puppeteer_screenshot()"
          echo "  4. Test interactions: mcp2_puppeteer_click('.your-selector')"
          echo "  5. Run system tests: mise exec -- bin/rails test:system"
          echo ""
          echo "Include testing keywords in commit messages:"
          echo "  - 'puppeteer', 'screenshot', 'manual test', 'tested locally'"
          echo "  - 'browser preview', 'visual verification', 'UI tested'"
          echo ""
          echo "📖 See: AGENTS.md - Complete UI Testing Checklist"
          echo ""
          echo "💡 To fix: Amend commits with testing evidence or squash into tested commits"
          exit 1
        fi
        
        echo "✅ All UI changes have testing evidence"
    review-loop-enforcement:
      run: scripts/enforce-review-loop.sh
      tags: meta reviews
    dependency_check:
      tags: validation
      skip_output:
        - stdout
      run: |
        #!/bin/bash
        echo "🔍 Checking for missing gem dependencies..."
        
        # Check if any require statements don't have corresponding gems
        missing_deps=""
        
        # Find all require statements in committed files
        for file in $(git diff --cached --name-only --diff-filter=ACM | grep -E '\.(rb|erb)$'); do
          if [ -f "$file" ]; then
            # Look for require statements (excluding require_relative)
            requires=$(grep -n "require ['\"]" "$file" | grep -v "require_relative" | sed "s/.*require ['\"]//" | sed "s/['\"].*//")
            for req in $requires; do
              gem_name=$(echo "$req" | cut -d'/' -f1)
              # Skip standard library requires and Rails core
              case "$gem_name" in
                date|json|uri|net|open-uri|digest|base64|securerandom|logger|pathname|fileutils|tmpdir|yaml|csv|stringio|ostruct|set|forwardable|delegate|benchmark|timeout|pp|pstore|dbm|etc|fcntl|fiddle|io|nkf|openssl|psych|pty|racc|rbconfig|readline|ripper|socket|syslog|thread|time|zlib|english|irb|mkmf|optparse|prime|profiler|rake|rdoc|rss|rubygems|shellwords|singleton|test|un|weakref|webrick|win32ole|xmlrpc)
                  continue
                  ;;
                rails*|active_*|action_*)
                  continue
                  ;;
              esac
              if ! grep -q "gem ['\"]$gem_name['\"]" Gemfile; then
                missing_deps="$missing_deps$gem_name (required in $file)\n"
              fi
            done
          fi
        done
        
        if [ -n "$missing_deps" ]; then
          echo "❌ Missing gem dependencies detected:"
          echo "$missing_deps"
          echo "   Please add these gems to your Gemfile"
          exit 1
        fi
        
        echo "✅ All dependencies appear to be present"
    rails-tests:
      tags: backend tests
      run: |
        if [ -f .env ]; then
          . ./.env
        fi
        echo "🚀 Setting up test environment..."
        
        # Setup phase - detailed logs captured by bin/setup into log/setup*.log
        if ! CI=true RAILS_ENV=test bin/setup --skip-server; then
          echo "❌ Failed to set up test environment (see log/setup.log for details)"
          exit 1
        fi
        
        echo "🔧 Preparing test database..."
        if ! CI=true RAILS_ENV=test bin/rails test:prepare --trace; then
          echo "❌ Failed to prepare test database"
          exit 1
        fi
        
        echo "🧪 Running Rails tests..."
        if ! CI=true RAILS_ENV=test bin/rails test --quiet; then
          echo "❌ Rails tests failed"
          exit 1
        fi
        
        echo "✅ Rails tests completed successfully."
        
        echo "🔍 Verifying tailwind.css existence locally after test:prepare..."
        if [ -f app/assets/builds/tailwind.css ]; then
          echo "✅ app/assets/builds/tailwind.css found locally."
        else
          echo "❌ app/assets/builds/tailwind.css NOT found locally after test:prepare."
          echo "   Contents of app/assets/builds/:"
          ls -la app/assets/builds/ || echo "app/assets/builds/ directory does not exist"
        fi
    test-next:
      tags: javascript frontend
      run: |
        echo "🚀 Verifying Next.js/JavaScript dependencies..."
        if command -v yarn >/dev/null 2>&1; then
          if ! CI=true yarn install --frozen-lockfile > log/prepush-yarn-install.log 2>&1; then
            echo "❌ Failed to install yarn dependencies. See log/prepush-yarn-install.log for details."
            exit 1
          fi
        else
          echo "⚠️ Skipping JavaScript dependency verification: yarn not available"
          exit 0
        fi
        echo "✅ Yarn dependencies verified successfully."
        # Note: 'next-build' and 'next-test' scripts were not found in the root package.json.
        # If these are required, ensure they are defined in the correct package.json
        # and update this hook accordingly, potentially changing the working directory.
    rails-system-tests:
      tags: test system
      run: |
        #!/bin/bash
        set -euo pipefail
        
        # Skip system tests if SKIP_SYSTEM_TESTS=1 (useful for network outages)
        if [ "${SKIP_SYSTEM_TESTS:-0}" = "1" ]; then
          echo "⚠️  Skipping system tests (SKIP_SYSTEM_TESTS=1)"
          echo "   Set SKIP_SYSTEM_TESTS=1 to bypass during network issues"
          exit 0
        fi
        
        # Timeout for entire system test suite: 3 minutes
        SYSTEM_TEST_TIMEOUT=180
        
        echo "🧪 Changed files may affect system behavior"
        echo "   Running full system test suite (timeout: ${SYSTEM_TEST_TIMEOUT}s)"
        
        echo "🚀 Setting up system test environment..."
        if ! timeout 60s ./bin/setup 2>&1 | tee log/setup.log; then
          echo "❌ Failed to set up system test environment (timeout or error)"
          exit 1
        fi
        
        echo "🔧 Preparing system test database..."
        if ! timeout 30s CI=true RAILS_ENV=test mise exec -- bin/rails test:prepare --trace; then
          echo "❌ Failed to prepare system test database (timeout or error)"
          exit 1
        fi
        
        echo "🧪 Running system tests..."
        if ! timeout ${SYSTEM_TEST_TIMEOUT}s CI=true RAILS_ENV=test HEADLESS=true CUPRITE=true APP_HOST='localhost' CUPRITE_JS_ERRORS=false mise exec -- bin/rails test:system --quiet; then
          echo "❌ System tests failed or timed out"
          echo "   Individual test timeout should be < 60s"
          echo "   Full suite timeout: ${SYSTEM_TEST_TIMEOUT}s"
          exit 1
        fi
        
        echo "✅ All system tests passed"
    tailwind-build-check:
      tags: frontend build
      run: scripts/verify-tailwind-build.sh
    cross-model-reminder:
      tags: meta
      run: |
        #!/bin/bash
        set -euo pipefail

        # If nothing is staged, do nothing
        if git diff --cached --quiet; then
          exit 0
        fi

        staged_files=$(git diff --cached --name-only)
        if [ -z "$staged_files" ]; then
          exit 0
        fi

        surfaces=()
        while IFS= read -r file; do
          case "$file" in
            app/assets/*|app/views/*)
              [[ " ${surfaces[*]} " =~ " ui " ]] || surfaces+=("ui")
              ;;
            app/controllers/*|app/helpers/*|app/serializers/*)
              [[ " ${surfaces[*]} " =~ " api " ]] || surfaces+=("api")
              ;;
            app/jobs/*|app/workers/*|app/services/*|app/mailers/*)
              [[ " ${surfaces[*]} " =~ " job " ]] || surfaces+=("job")
              ;;
          esac
        done <<<"$staged_files"

        if [ ${#surfaces[@]} -eq 0 ]; then
          exit 0
        fi

        branch=$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "unknown")
        echo "🔁 Cross-model review reminder (branch: $branch)"
        echo "    Staged files touch: ${surfaces[*]} surfaces"
        echo "    If today's fix was hard to verify, run:"
        echo "      scripts/generate-cross-model-prompt.sh <issue-url-or-number> ${surfaces[0]}"
        echo "      claude --model opus --message \"\$(scripts/generate-cross-model-prompt.sh <issue-url-or-number> ${surfaces[0]})\""
        if [[ " ${surfaces[*]} " =~ " ui " ]]; then
          echo "    For CSS/Tailwind/ERB-heavy visual fixes, you can also run:"
          echo "      scripts/ai-css-review.sh <issue-url-or-number>"
          echo "      claude --model opus --message \"\$(scripts/ai-css-review.sh <issue-url-or-number>)\""
        fi
        echo "    Details: docs/AGENTS.md#empirical-verification--cross-model-escalation-issue-981"
    gems-audit:
      tags: backend security
      run: |
        echo "🔍 Running gem audit (with timeout)..."
        if command -v timeout >/dev/null 2>&1; then
          if ! timeout 30 bundle audit check > log/prepush-gem-audit.log 2>&1; then
            echo "⚠️ Gem audit reported issues or timed out. See log/prepush-gem-audit.log for details."
          else
            echo "✅ Gem audit completed without blocking issues."
          fi
        else
          if ! bundle audit check > log/prepush-gem-audit.log 2>&1; then
            echo "⚠️ Gem audit reported issues. See log/prepush-gem-audit.log for details."
          else
            echo "✅ Gem audit completed without blocking issues."
          fi
        fi
    javascript-audit:
      tags: frontend security
      run: |
        if command -v yarn >/dev/null 2>&1; then
          if ! yarn npm audit --all > log/prepush-yarn-audit.log 2>&1; then
            echo "⚠️ JavaScript audit reported issues. See log/prepush-yarn-audit.log for details."
          else
            echo "✅ JavaScript audit completed without blocking issues."
          fi
        else
          echo "⚠️ Skipping JavaScript audit: yarn not available"
        fi
    importmaps-audit:
      tags: frontend security
      run: |
        if ! bin/importmap audit > log/prepush-importmap-audit.log 2>&1; then
          echo "⚠️ Importmap audit reported issues. See log/prepush-importmap-audit.log for details."
        else
          echo "✅ Importmap audit completed without blocking issues."
        fi
    verify_ci_ready:
      tags: backend ci
      run: |
        echo "Checking for mise updates and attempting to upgrade if necessary..."
        if command -v brew >/dev/null 2>&1; then
          if brew outdated | grep -q "mise"; then
            echo "Mise is outdated, attempting to upgrade via Homebrew..."
            if ! (brew update && brew upgrade mise); then
              echo "❌ Failed to upgrade mise. Please upgrade it manually."
              exit 1
            fi
            echo "✅ Mise upgraded successfully."
          else
            echo "ℹ️ Mise is up to date."
          fi
        else
          echo "⚠️ Skipping mise upgrade: Homebrew (brew) not available"
        fi
        echo "Verifying CI readiness with mise doctor (logging to .mise_doctor.log)..."
        if ! mise doctor > .mise_doctor.log 2>&1; then
          echo "❌ mise doctor failed. See .mise_doctor.log for details."
          exit 1
        fi
        echo "✅ CI environment ready."
    rubocop:
      tags: backend style
      glob: '*.rb'
      run: bundle exec rubocop --parallel --force-exclusion {staged_files}
      stage_fixed: true
    erb_lint:
      tags: backend style
      glob: '*.erb'
      run: bundle exec erblint --lint-all --format compact {staged_files}
      stage_fixed: true
    prettier:
      tags: frontend style
      glob: '*.{js,jsx,ts,tsx,json,css,scss,md}'
      run: |
        if command -v yarn >/dev/null 2>&1; then
          yarn prettier --write {staged_files}
        else
          echo "⚠️ Skipping prettier: yarn not available"
        fi
      stage_fixed: true
    yaml-lint:
      tags: backend style
      exclude: "rebase-merge-only develop" # allow rebase-merge-only develop to be invalid YAML
      glob: '*.yml'
      run: bundle exec yaml-lint {staged_files}
      stage_fixed: true
    # rails-tests are run in pre-push instead of pre-commit for better performance
    # and to avoid breaking the commit flow with potentially long-running tests
    verify_environment:
      run: bin/container-healthcheck.sh && { echo "✓ Environment valid"; exit 0; } || { echo "✗ Environment invalid - run bin/setup-environment.sh"; exit 1; }
      tags: validation
      skip:
        - merge
        - rebase

fixer:
  verbose: false
  pty: false
  parallel: true
  commands:
    ruby-fixer:
      glob: '**/*.rb'
      run: bundle exec rubocop --autocorrect-all  --force-exclusion {all_files}
      stage_fixed: true
    js-fixer:
      glob: 'app/javascript/**/*.{js,ts,jsx,tsx}'
      run: |
        if command -v yarn >/dev/null 2>&1; then
          yarn prettier --write {all_files}
        else
          echo "⚠️ Skipping JS fixer: yarn not available"
        fi
      stage_fixed: true
    ruby-prettier:
      glob: 'app/**/*.rb'
      run: bundle exec rbprettier --write {files}
      stage_fixed: true
    erb_lint:
      glob: 'app/views/**/*.erb'
      run: bundle exec erb_lint --autocorrect {all_files}
      stage_fixed: true
    yaml-lint:
      tags: lint
      glob: "*.{yml,yaml}"
      run: yamllint {all_files}
      stage_fixed: true
    brakeman:
      run: bundle exec brakeman --no-pager
    yarn-audit:
      tags: frontend security
      run: |
        if command -v yarn >/dev/null 2>&1; then
          yarn npm audit
        else
          echo "⚠️ Skipping yarn audit: yarn not available"
        fi
    gems-audit:
      tags: backend security
      run: |
        echo "🔍 Running gem audit (with timeout)..."
        if ! timeout 30 bundle audit check; then
          echo "⚠️ Gem audit check timeout or issues found - continuing with timeout to prevent blocking"
        fi
    i18n-tasks:
      run: bundle exec i18n-tasks health || bundle exec i18n-tasks normalize
      stage_fixed: true
    yarn-lint:
      tags: frontend updates
      glob: '{app/javascript/**/*.{js,ts,jsx,tsx},**/*.{css,scss,sass,md,json}}'
      run: |
        if command -v yarn >/dev/null 2>&1; then
          yarn prettier --write {all_files}
        else
          echo "⚠️ Skipping yarn lint: yarn not available"
        fi
      stage_fixed: true
    importmaps-audit:
      tags: frontend security
      run: bin/importmap outdated
