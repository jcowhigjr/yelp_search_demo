# Prefix all commands with `mise exec --`
baseBranch: main
mergeMethod: squash
pollInterval: 300
reviewModel: local-gpt
autoApprove: false
requiredChecks:
  - ci/tests
  - security/scan
maxReviewAttempts: 3
reviewTimeout: 1800
ignorePaths:
  - node_modules/**
  - vendor/**
  - "*.lock"
  - "*.log"
  - dist/**
notifications:
  slackWebhook: "https://hooks.slack.com/services/..."
  emailRecipients:
    - team@example.com
  notifyOnApproval: true
  notifyOnMerge: true
  notifyOnFailure: true
minApprovals: 1
allowSelfApproval: false
requireReviewFromCodeowners: true
allowForkPRs: true
requireSignedCommits: false
