# Dependabot configuration for automated dependency updates
# Enables safe updates for patch and minor versions without human intervention
# Documentation: https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  # GitHub Actions updates
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    allow:
      - dependency-type: all
        update-types: ["version-update:semver-minor"]
      - dependency-type: all
        update-types: ["version-update:semver-patch"]
      - dependency-type: all
        update-types: ["security-update"]
    
  # Ruby/Bundler dependencies
  - package-ecosystem: bundler
    directory: /
    schedule:
      interval: daily
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    # Enable safe automated updates for patch and minor versions
    allow:
      - dependency-type: production
        update-types: ["security-update"]
      - dependency-type: production
        update-types: ["version-update:semver-patch"]
      - dependency-type: production
        update-types: ["version-update:semver-minor"]
      - dependency-type: development
        update-types: ["version-update:semver-major", "version-update:semver-minor", "version-update:semver-patch"]
    # Group related updates to reduce PR noise
    groups:
      test-dependencies:
        patterns:
          - "rspec*"
          - "capybara*"
          - "factory_bot*"
          - "faker"
          - "shoulda*"
      rails-ecosystem:
        patterns:
          - "rails*"
          - "actionpack*"
          - "activerecord*"
          - "activesupport*"
          - "actionview*"
          - "actionmailer*"
          - "activejob*"
          - "actioncable*"
          - "activestorage*"
