name: Auto-approve & merge Dependabot PRs
on:
  workflow_run:
    workflows: ["Ruby on Rails CI"]
    types:
      - completed
  # Fallback triggers for direct Dependabot PR events
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: write
  actions: write
  checks: write
  statuses: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    # Handle both workflow_run and direct pull_request triggers
    if: |
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        (
          github.event.workflow_run.actor.login == 'dependabot[bot]' ||
          startsWith(github.event.workflow_run.head_branch, 'dependabot/')
        )
      ) ||
      (
        github.event_name == 'pull_request' &&
        (
          github.event.pull_request.user.login == 'dependabot[bot]' ||
          startsWith(github.event.pull_request.head.ref, 'dependabot/')
        )
      ) ||
      (
        github.event_name == 'pull_request_target' &&
        (
          github.event.pull_request.user.login == 'dependabot[bot]' ||
          startsWith(github.event.pull_request.head.ref, 'dependabot/')
        )
      )
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get PR number from workflow run or direct event
        id: pr
        run: |
          if [ "${{ github.event_name }}" == "workflow_run" ]; then
            # Extract PR number from the workflow_run event safely using jq
            PR_NUMBER=$(jq --raw-output '.workflow_run.pull_requests[0].number // ""' "$GITHUB_EVENT_PATH")
            echo "Found PR number from workflow_run: $PR_NUMBER"
          else
            # Direct pull_request event
            PR_NUMBER="${{ github.event.number }}"
            echo "Found PR number from pull_request: $PR_NUMBER"
          fi
          echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT

      - name: Fetch Dependabot metadata
        if: steps.pr.outputs.number != ''
        id: metadata
        uses: dependabot/fetch-metadata@v3.1.0
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          pull-request: ${{ steps.pr.outputs.number || github.event.pull_request.number || '' }}

      - name: Update PR with latest develop changes if needed
        if: steps.pr.outputs.number != ''
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Checking if PR #$PR_NUMBER needs update with develop changes..."

          # Check if PR is behind develop using mergeStateStatus (string values: BEHIND, CLEAN, etc.)
          BEHIND=$(gh pr view "$PR_NUMBER" --json mergeStateStatus --jq '((.mergeStateStatus // "") | ascii_upcase) == "BEHIND"')
          if [ "$BEHIND" = "true" ]; then
            echo "PR is behind develop, updating..."
            gh pr merge --auto --squash "$PR_NUMBER" || echo "Auto-merge setup failed, will retry after CI"
          else
            echo "PR is up to date or mergeable status unknown"
          fi

      - name: Approve and enable auto-merge for Dependabot PR
        if: steps.pr.outputs.number != '' && steps.metadata.outputs.update-type != 'version-update:semver-major'
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Processing Dependabot PR #$PR_NUMBER"

          # Always approve Dependabot PRs; merging is gated by required checks
          gh pr review --approve "$PR_NUMBER" --body "Auto-approved by CI for Dependabot PR. Auto-merge will occur after required checks pass."

          # Enable GitHub auto-merge (squash). It will merge automatically once all required checks pass and branch protection is satisfied.
          gh pr merge --auto --squash "$PR_NUMBER"

      - name: Flag major updates for manual review
        if: steps.pr.outputs.number != '' && steps.metadata.outputs.update-type == 'version-update:semver-major'
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Major update detected for PR #$PR_NUMBER - leaving for manual review"
          gh pr comment "$PR_NUMBER" --body "⚠️ Major version bump detected. CI approval has been applied, but auto-merge is disabled so a human can review and merge."
