name: Auto-approve & merge Dependabot PRs
on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2.4.0
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Auto-approve Dependabot PRs
        run: |
          UPDATE_TYPE="${{ steps.metadata.outputs.update-type }}"
          DEPENDENCY_TYPE="${{ steps.metadata.outputs.dependency-type }}"
          
          # Auto-approve low-risk updates
          if [[ "$UPDATE_TYPE" == "version-update:semver-patch" ]]; then
            echo "Auto-approving patch update"
            gh pr review --approve "$PR_URL" --body "Auto-approved patch dependency update"
            gh pr merge --auto --squash "$PR_URL"
          elif [[ "$UPDATE_TYPE" == "version-update:semver-minor" && "$DEPENDENCY_TYPE" == "development" ]]; then
            echo "Auto-approving minor development dependency update"
            gh pr review --approve "$PR_URL" --body "Auto-approved minor development dependency update"
            gh pr merge --auto --squash "$PR_URL"
          else
            echo "Update requires manual review: $UPDATE_TYPE ($DEPENDENCY_TYPE)"
          fi
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GH_TOKEN: ${{secrets.GITHUB_TOKEN}}
