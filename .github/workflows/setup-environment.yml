name: Setup Environment

on:
  push:
    branches:
      - experiment-mise-github-action
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Environment
        run: ./bin/setup-environment.sh
      - name: test environment
        run: |
          bin/container-healthcheck.sh
