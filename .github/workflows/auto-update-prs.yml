name: Auto-update PRs

on:
  push:
    branches:
      - develop  # Update PRs when develop branch is updated

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-update:
    runs-on: ubuntu-latest
    # Skip this job for PRs from Dependabot to avoid circular updates
    if: ${{ github.actor != 'dependabot[bot]' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Fetch all history for all branches and tags
      
      - name: Update PR branches that are behind develop
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Listing PRs targeting develop that are behind..."
          # Fetch PRs with fields we need and select those behind base
          mapfile -t PRS < <(gh pr list \
            --base develop \
            --state open \
            --json number,isCrossRepository,headRefName \
            --jq '.[] | select(.isCrossRepository == false) | .number')

          if [[ ${#PRS[@]} -eq 0 ]]; then
            echo "No open PRs behind develop."
            exit 0
          fi

          echo "PRs to update: ${PRS[*]}"
          for PR in "${PRS[@]}"; do
            echo "Updating branch on PR #${PR}"
            # Fetch the current head SHA and branch name for concurrency control
            PR_DATA=$(gh pr view "$PR" --json headRefOid,headRefName --jq '{sha: .headRefOid, branch: .headRefName}')
            HEAD_SHA=$(echo "$PR_DATA" | jq -r '.sha')
            HEAD_BRANCH=$(echo "$PR_DATA" | jq -r '.branch')

            # Conditionally include expected_head_sha only if non-empty
            if [[ -n "$HEAD_SHA" ]]; then
              gh api \
                -X PUT \
                "repos/${{ github.repository }}/pulls/${PR}/update-branch" \
                -f expected_head_sha="$HEAD_SHA" || echo "Update-branch API failed for PR #${PR} (likely already up-to-date or permissions). Continuing."
            else
              gh api \
                -X PUT \
                "repos/${{ github.repository }}/pulls/${PR}/update-branch" || echo "Update-branch API failed for PR #${PR} (likely already up-to-date or permissions). Continuing."
            fi

            # Wait a moment for the async update to complete
            echo "Waiting for branch update to complete..."
            sleep 5

            # Explicitly trigger CI workflow for this PR
            echo "Triggering CI workflow for PR #${PR} (branch: ${HEAD_BRANCH})"
            gh workflow run main.yml \
              --ref "${HEAD_BRANCH}" \
              --field triggered_by="auto-update-prs" \
              --field pr_number="${PR}" || echo "Failed to trigger workflow for PR #${PR}. May not have workflow_dispatch enabled."
          done
          echo "Done."
