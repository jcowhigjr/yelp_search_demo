---
# This workflow uses actions that are not certified by GitHub.  They are
# provided by a third-party and are governed by separate terms of service,
# privacy policy, and support documentation.
#
# This workflow will install a prebuilt Ruby version, install dependencies, and
# run tests and linters.
#  NOTE: https://github.community/t/retry-for-failed-steps/17136/7

name: 'Ruby on Rails CI'
on:
  push:
    branches:
      - develop
      - 'dependabot/**'
  pull_request:
    branches:
      - develop
      - main
    types: [opened, synchronize, reopened, edited, labeled, ready_for_review]
  workflow_dispatch:
  workflow_run:
    workflows: ["Auto-update PRs", "Automated PR Management"]
    types:
      - completed
# Removed workflow_run trigger that was preventing CI from running
# on updated Dependabot PR commits. Risk assessment logic moved inline.

# Add workflow-level permissions to fix permission issues
permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: write
  checks: write
  statuses: write

# concurrency:
#   group: ${{ github.workflow }}-${{ github.ref }}
#   cancel-in-progress: true

jobs:
  # Get risk assessment for Dependabot PRs (optional job)
  get-risk-assessment:
    # Run for all PRs, but handle non-Dependabot PRs differently
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_run'
    runs-on: ubuntu-latest
    outputs:
      skip-system-tests: ${{ steps.assessment.outputs.skip-system-tests }}
      risk-level: ${{ steps.assessment.outputs.risk-level }}
      is-dependabot: ${{ steps.assessment.outputs.is-dependabot }}
    steps:
      - name: Get Dependabot metadata
        id: metadata
        if: github.event.pull_request.user.login == 'dependabot[bot]'
        uses: dependabot/fetch-metadata@v2.4.0
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
      
      - name: Assess risk
        id: assessment
        run: |
          # Check if this is a Dependabot PR
          if [[ "${{ github.event.pull_request.user.login }}" == "dependabot[bot]" ]] || [[ "${{ github.event.pull_request.head.ref }}" =~ ^dependabot/ ]]; then
            # Get Dependabot metadata
            UPDATE_TYPE="${{ steps.metadata.outputs.update-type }}"
            DEPENDENCY_TYPE="${{ steps.metadata.outputs.dependency-type }}"
            # Default to skipping system tests unless this is a major bump
            SKIP_SYSTEM_TESTS="true"
            RISK_LEVEL="medium"
            IS_DEPENDABOT="true"
            
            if [[ "$UPDATE_TYPE" == "version-update:semver-major" ]]; then
              SKIP_SYSTEM_TESTS="false"
              RISK_LEVEL="high"
            fi
          else
            # Non-Dependabot PRs - always run system tests
            SKIP_SYSTEM_TESTS="false"
            RISK_LEVEL="medium"
            IS_DEPENDABOT="false"
          fi
          
          echo "skip-system-tests=$SKIP_SYSTEM_TESTS" >> $GITHUB_OUTPUT
          echo "risk-level=$RISK_LEVEL" >> $GITHUB_OUTPUT
          echo "is-dependabot=$IS_DEPENDABOT" >> $GITHUB_OUTPUT

  test-next:
    runs-on: ubuntu-latest
    needs: [get-risk-assessment]
    if: always() && !cancelled() && (needs.get-risk-assessment.result == 'success' || needs.get-risk-assessment.result == 'skipped')
    permissions:
      contents: read # Added for least privilege
    env:
      # Control Rails test parallelization for "next" jobs (default: 3 workers)
      RAILS_TEST_WORKERS: 3
      BUNDLE_PATH: vendor/bundle
      BUNDLE_WITHOUT: production
    steps:
      - name: checkout code
        uses: actions/checkout@v6
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq libyaml-dev libpq-dev chromium-browser
      - name: Cache mise tools
        uses: actions/cache@v4
        with:
          path: ~/.local/share/mise
          key: mise-${{ runner.os }}-${{ hashFiles('mise.toml') }}
          restore-keys: |
            mise-${{ runner.os }}-
      - name: Cache gems (next)
        uses: actions/cache@v4
        with:
          path: vendor/bundle
          key: gems-next-${{ runner.os }}-${{ hashFiles('Gemfile.lock') }}
          restore-keys: |
            gems-next-${{ runner.os }}-
      - name: Setup Environment via mise
        env:
          SETUP_SKIP_NODE: "true"
        run: |
          bash bin/setup-environment.sh
          # Add mise to PATH for subsequent steps
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Build next and unit test
        env:
          RAILS_ENV: test
          RAILS_MASTER_KEY: ${{ secrets.RAILS_TEST_KEY }}
          CI: true
        continue-on-error: false
        run: |
          mise run setup-next
          mise run test-next-run
      - name: system-test-next
        id: system-test-next
        continue-on-error: true # make the step always success and set status later
        # Skip system tests for low-risk Dependabot updates
        if: github.actor != 'dependabot[bot]' || (needs.get-risk-assessment.result != 'skipped' && needs.get-risk-assessment.outputs.skip-system-tests != 'true')
        env:
          RAILS_ENV: test
          RAILS_MASTER_KEY: ${{ secrets.RAILS_TEST_KEY }}
          CI: true
        run: |
          mise run test-next-system-ci
      - name: system-test-next-retry
        id: system-test-next-retry-1
        continue-on-error: true # make the step always success and set status later
        if: steps.system-test-next.outcome=='failure' && (github.actor != 'dependabot[bot]' || (needs.get-risk-assessment.result != 'skipped' && needs.get-risk-assessment.outputs.skip-system-tests != 'true'))
        env:
          RAILS_ENV: test
          RAILS_MASTER_KEY: ${{ secrets.RAILS_TEST_KEY }}
        run: |
          mise run test-next-system-ci -- --verbose
      - name: Upload failed system test images (next)
        uses: actions/upload-artifact@v5
        if: steps.system-test-next.outcome=='failure'  ||  steps.system-test-next-retry-1.outcome=='failure' # check the step outcome, retry 1st time
        with:
          path: ./tmp/capybara/screenshots/failures_*.png
      - name: set the status for next tests # set the workflow status if command failed
        if: steps.system-test-next.outcome=='failure'
        run: |
          if ${{ steps.system-test-next-retry-1.outcome=='success' }}; then
             echo 'the first next system test failed, but the second one passed'
          else
             echo 'the first next system test failed, and the second one also failed'
             exit 1
          fi
  test:
    runs-on: ubuntu-latest
    needs: [get-risk-assessment]
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/develop') ||
      (github.event_name == 'pull_request' && 
       (needs.get-risk-assessment.result == 'success' || needs.get-risk-assessment.result == 'skipped'))
    permissions:
      contents: read # Added for least privilege
    env:
      # Control Rails test parallelization for classic tests (default: 3 workers)
      RAILS_TEST_WORKERS: 3
      BUNDLE_PATH: vendor/bundle
      BUNDLE_WITHOUT: production
    steps:
      - name: checkout code
        uses: actions/checkout@v6
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq libyaml-dev libpq-dev chromium-browser
      - name: Cache mise tools
        uses: actions/cache@v4
        with:
          path: ~/.local/share/mise
          key: mise-${{ runner.os }}-${{ hashFiles('mise.toml') }}
          restore-keys: |
            mise-${{ runner.os }}-
      - name: Cache gems
        uses: actions/cache@v4
        with:
          path: vendor/bundle
          key: gems-${{ runner.os }}-${{ hashFiles('Gemfile.lock') }}
          restore-keys: |
            gems-${{ runner.os }}-
      - name: Setup Environment via mise
        env:
          SETUP_SKIP_NODE: "true"
        run: |
          bash bin/setup-environment.sh
          # Add mise to PATH for subsequent steps
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Setup Application (gems, db, etc.)
        env:
          RAILS_ENV: test
          RAILS_MASTER_KEY: ${{ secrets.RAILS_TEST_KEY }}
          CI: true
        run: mise run setup-test
      - name: Run Brakeman
        run: mise run brakeman
      - name: Script CLI tests (stacked-pr.sh)
        run: mise run test-scripts
      - name: Build and run unit-tests
        env:
          RAILS_ENV: test
          RAILS_MASTER_KEY: ${{ secrets.RAILS_TEST_KEY }}
          CI: true
        run: |
          # test prepare is handled by dependency of mise run test
          mise run test
      - name: system-tests
        id: system-test
        continue-on-error: true # make the step always success and set status later
        # Skip system tests for low-risk Dependabot updates
        if: github.actor != 'dependabot[bot]' || (needs.get-risk-assessment.result != 'skipped' && needs.get-risk-assessment.outputs.skip-system-tests != 'true')
        env:
          RAILS_ENV: test
          RAILS_MASTER_KEY: ${{ secrets.RAILS_TEST_KEY }}
          CI: true
        run: |
          mise run test-system
      - name: system-test-retry
        id: system-test-retry-1
        continue-on-error: true # make the step always success and set status later
        if: steps.system-test.outcome=='failure' && (github.actor != 'dependabot[bot]' || (needs.get-risk-assessment.result != 'skipped' && needs.get-risk-assessment.outputs.skip-system-tests != 'true'))
        env:
          RAILS_ENV: test
          RAILS_MASTER_KEY: ${{ secrets.RAILS_TEST_KEY }}
        run: |
          mise run test-system -- --verbose
      - name: Upload failed system test images
        uses: actions/upload-artifact@v5
        if: steps.system-test.outcome=='failure'  ||  steps.system-test-retry-1.outcome=='failure' # check the step outcome, retry 1st time
        with:
          path: ./tmp/capybara/screenshots/failures_*.png
      - name: set the status # set the workflow status if command failed
        if: steps.system-test.outcome=='failure'
        run: |
          if ${{ steps.system-test-retry-1.outcome=='success' }}; then
             echo 'the first system test failed, but the second one passed'
          else
             echo 'the first system test failed, and the second one also failed'
             exit 1
          fi
  # Note: Auto-merge logic has been moved to auto-approve.yml
  # to avoid conflicts with branch protection and CodeQL requirements

  verify-deployment:
    name: Verify Heroku Deployment
    runs-on: ubuntu-latest
    needs: [test, test-next] # Ensure tests pass before verifying deployment
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    permissions:
      contents: read # Added for least privilege
    env:
      HEROKU_APP_URL: ${{ secrets.HEROKU_APP_NAME }} # Using the secret name you provided
    steps:
      - name: Wait for Heroku deployment
        run: |
          echo "Waiting for Heroku to deploy (2 minutes)..."
          sleep 120

      - name: Check health endpoint
        run: |
          MAX_RETRIES=10
          RETRY_INTERVAL=30 # seconds
          RETRY_COUNT=0
          HEALTH_CHECK_URL="$HEROKU_APP_URL/healthz"

          echo "Starting health check for $HEALTH_CHECK_URL..."

          until curl --silent --fail --output /dev/null "$HEALTH_CHECK_URL"; do
            RETRY_COUNT=$((RETRY_COUNT + 1))
            if [ "$RETRY_COUNT" -ge "$MAX_RETRIES" ]; then
              echo "Health check failed for $HEALTH_CHECK_URL after $MAX_RETRIES retries."
              echo "This is the develop branch; logging health check failure but not failing the workflow."
              exit 0
            fi
            echo "Health check failed (attempt $RETRY_COUNT/$MAX_RETRIES). Retrying in $RETRY_INTERVAL seconds..."
            sleep $RETRY_INTERVAL
          done
          echo "Health check for $HEALTH_CHECK_URL successful!"
