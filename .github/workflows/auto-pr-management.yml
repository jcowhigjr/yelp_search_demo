name: Automated PR Management

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches:
      - develop

# Define permissions at workflow level
permissions:
  contents: write
  pull-requests: write

jobs:

  # Auto-update PRs when develop changes
  auto-update:
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup GitHub CLI
        uses: cli/cli-action@v2

      - name: Auto-update PRs
        run: |
          PR_NUMBERS=$(gh pr list --base develop --json number --jq '.[].number')
          
          echo "Found the following PRs targeting develop: $PR_NUMBERS"
          
          for PR_NUMBER in $PR_NUMBERS; do
            echo "Updating PR #$PR_NUMBER"
            gh pr update $PR_NUMBER --repo ${{ github.repository }} || \
              echo "Failed to update PR #$PR_NUMBER, continuing with others"
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
