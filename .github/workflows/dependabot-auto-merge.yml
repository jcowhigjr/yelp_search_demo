name: Dependabot Auto-Merge

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  dependabot-auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2.4.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-approve PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr review --approve "${{ github.event.pull_request.number }}" \
            --body "Auto-approved by CI for Dependabot PR. Auto-merge will occur after required checks pass."

      - name: Enable auto-merge for safe updates
        # Auto-merge patch updates, minor updates for dev deps, and all development dependencies
        if: |
          (steps.metadata.outputs.update-type == 'version-update:semver-patch') ||
          (steps.metadata.outputs.update-type == 'version-update:semver-minor' && steps.metadata.outputs.dependency-type == 'development') ||
          (steps.metadata.outputs.dependency-type == 'development')
        run: |
          echo "Auto-merging Dependabot PR..."
          echo "Dependency: ${{ steps.metadata.outputs.dependency-names }}"
          echo "Update type: ${{ steps.metadata.outputs.update-type }}"
          echo "Dependency type: ${{ steps.metadata.outputs.dependency-type }}"
          echo "Previous version: ${{ steps.metadata.outputs.previous-version }}"
          echo "New version: ${{ steps.metadata.outputs.new-version }}"
          
          # Enable auto-merge
          gh pr merge --auto --squash ${{ github.event.pull_request.number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on non-auto-mergeable PRs
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-major' ||
          (steps.metadata.outputs.update-type == 'version-update:semver-minor' && steps.metadata.outputs.dependency-type != 'development')
        uses: actions/github-script@v9
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🤖 **Dependabot Auto-Merge Status**
              
              This PR requires manual review because:
              - Update type: \`${{ steps.metadata.outputs.update-type }}\`
              - Dependency type: \`${{ steps.metadata.outputs.dependency-type }}\`
              
              Major updates and minor production dependency updates require manual approval for safety.
              
              To auto-merge this PR, please review the changes and run:
              \`\`\`
              gh pr merge --auto --squash ${{ github.event.pull_request.number }}
              \`\`\`
              `
            });
