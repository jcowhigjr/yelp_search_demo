name: Claude Debug Authentication

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  debug-claude-auth:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Debug environment
        run: |
          echo "=== GitHub Actions Environment ==="
          echo "Runner OS: $RUNNER_OS"
          echo "GitHub Event: ${{ github.event_name }}"
          echo "GitHub Actor: ${{ github.actor }}"
          echo "Repository: ${{ github.repository }}"
          echo "PR Number: ${{ github.event.pull_request.number }}"
          
      - name: Check secret availability
        run: |
          echo "=== Secret Availability Check ==="
          if [ -n "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "✓ ANTHROPIC_API_KEY is available"
          else
            echo "✗ ANTHROPIC_API_KEY is NOT available"
          fi
          
          if [ -n "${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}" ]; then
            echo "✓ CLAUDE_CODE_OAUTH_TOKEN is available"
          else
            echo "✗ CLAUDE_CODE_OAUTH_TOKEN is NOT available"
          fi
          
      - name: Test Claude Code Action with API Key
        if: ${{ secrets.ANTHROPIC_API_KEY != '' }}
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
        continue-on-error: true
        
      - name: Test Claude Code Action with OAuth Token
        if: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        continue-on-error: true
        
      - name: Summary
        if: always()
        run: |
          echo "=== Debug Summary ==="
          echo "Workflow completed. Check the logs above for authentication results."
