name: Dependabot Update Gemfile.next.lock
on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  contents: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: startsWith(github.head_ref, 'dependabot/')
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: Extract Ruby Version
        id: ruby_version
        env:
          BUNDLE_GEMFILE: Gemfile.next
        run: |
          major_minor_version=$(grep -A 1 "RUBY VERSION" Gemfile.next.lock | tail -n 1 | awk '{split($2,a,"[p.]"); print a[1] "." a[2]}')
          echo "version=$major_minor_version" >> $GITHUB_OUTPUT
      - name: Setup Ruby 3
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ steps.ruby_version.outputs.version }}
          bundler-cache: true
        env:
          BUNDLE_GEMFILE: Gemfile.next
          BUNDLE_FROZEN: 'false'

      - name: Commit and push updated Gemfile.next.lock
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain)" ]]; then
            git add Gemfile.next.lock
            git commit -m "Update Gemfile.next.lock"
            git push origin ${{ github.head_ref }}
          else
            echo "No changes to commit."
          fi
